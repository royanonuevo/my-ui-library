name: Deploy

on:
  push:
    branches: 
      - main

jobs:

  build-and-push:
    name: build and upload image
    runs-on: ubuntu-latest
    steps:
      - name: Setup go
        uses: actions/setup-go@v4
        with:
          go-version: '^1'

      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: recruitment-ecr-session

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.REPO }}
          PROXY_REPOSITORY: ${{ env.PROXY_REPOSITORY }}
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build -f Dockerfile.frontend --build-arg="NEXT_PUBLIC_BUILD_VERSION=$IMAGE_TAG" -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          # docker build -t $REGISTRY/$PROXY_REPOSITORY:$IMAGE_TAG -f .docker/nginx/Dockerfile .

  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare bastion key
        run: echo "${{ secrets.TO_AWS_BASTION_KEY }}" > to-aws-bastion-key.pem
        
      - name: Change File Premission
        run: chmod 600 to-aws-bastion-key.pem

      - name: SSH to host and update
        run: ssh -o StrictHostKeyChecking=no -i to-aws-bastion-key.pem -p 4422 ${{ env.LOGIN_USERNAME }}@${{ env.AWS_BASTION_HOST }} 'ssh -i /home/${{ env.LOGIN_USERNAME }}/tgo-dev.pem ${{ env.AWS_USERNAME }}@${{ env.AWS_WEB_HOST }} "sudo sh /data/Recruitment-Portal/update-tgoserver.sh ${{ env.TAG_NAME }}" '
